name: fairy-tale-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  solidity:
    name: solidity (parity / residency / install-smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unified CLI self-controls
        run: ./fairy selftest
      - name: Unified deterministic validation suite
        run: ./fairy validate
        env:
          GITHUB_TOKEN: ${{ github.token }}

  adapters:
    name: adapters (manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unified CLI doctor (residency + adapter manifests)
        # Python and Rust stable are pre-installed on ubuntu-latest runners.
        run: ./fairy doctor

  task-artifact-python-compatibility:
    name: task artifacts (Python 3.13 compatibility)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Task artifact gate (self-controls)
        run: python3 scripts/task_artifacts.py selftest
      - name: Task artifact acceptance cases
        run: python3 scripts/task_artifacts.py cases --cases fixtures/task-artifacts/cases.jsonl
